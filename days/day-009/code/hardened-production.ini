; /etc/php/8.2/fpm/php.ini — HARDENED PRODUCTION CONFIG
; Based on CIS PHP Benchmark + OWASP PHP Security Cheat Sheet
; Review and adjust resource limits for your specific application needs.

; =============================================================================
; INFORMATION DISCLOSURE
; =============================================================================

; Don't advertise PHP version in HTTP response headers
expose_php = Off

; =============================================================================
; ERROR HANDLING
; =============================================================================

; NEVER show errors to users in production — leaks sensitive internal details
display_errors = Off
display_startup_errors = Off

; DO log errors — but only to a file that is NOT web-accessible
log_errors = On
error_log = /var/log/php/error.log     ; Ensure this path is outside the web root!

; Log all error types internally, display none
error_reporting = E_ALL

; =============================================================================
; DANGEROUS FUNCTION RESTRICTIONS (post-exploitation firewall)
; =============================================================================

; Disable functions attackers use for OS command execution, recon, and evasion.
; Even if an attacker achieves code execution via a bug in your app, this
; significantly limits what they can do next.
disable_functions = exec,passthru,shell_exec,system,proc_open,popen,\
    curl_exec,curl_multi_exec,parse_ini_file,show_source,\
    phpinfo,base64_decode,eval

; Note: Remove phpinfo() from production entirely — it exposes your entire
; server configuration, environment variables, and loaded modules.

; Disable dangerous classes (add any other dangerous ones specific to your app)
disable_classes =

; =============================================================================
; REMOTE FILE / URL ACCESS
; =============================================================================

; PHP cannot open remote URLs via standard file functions (fopen, file_get_contents)
; Prevents SSRF attacks
allow_url_fopen = Off

; CRITICAL: Completely blocks Remote File Inclusion (RFI) attacks
; This should ALWAYS be Off in production
allow_url_include = Off

; =============================================================================
; FILE UPLOADS
; =============================================================================

; Enable only if your application actually needs file uploads
file_uploads = On
upload_max_filesize = 8M         ; Set to your actual maximum needed — not 100M!
max_file_uploads = 5             ; Limit number of files per request

; =============================================================================
; RESOURCE LIMITS (prevent Denial of Service attacks)
; =============================================================================

memory_limit = 128M              ; Tune to your app's actual memory needs
max_execution_time = 30          ; Most legitimate requests complete in < 5s
max_input_time = 30
post_max_size = 10M
max_input_vars = 1000            ; Prevents hash collision DoS attacks (PHP < 5.3.9)

; =============================================================================
; SESSION SECURITY
; =============================================================================

; Prevent JavaScript (including XSS payloads) from accessing session cookies
session.cookie_httponly = 1

; Only send session cookie over HTTPS — never over plain HTTP
session.cookie_secure = 1

; Reject unrecognized session IDs — prevents session fixation attacks
session.use_strict_mode = 1

; Controls cross-site cookie sending:
; - Strict: never sent cross-site (strongest, may break some OAuth flows)
; - Lax: sent on top-level navigation (good balance)
session.cookie_samesite = Strict

; Sessions expire after 30 minutes of inactivity
session.gc_maxlifetime = 1800

; NEVER accept session ID from URL parameters (prevents session fixation via links)
session.use_only_cookies = 1

; Use longer, more random session IDs
session.sid_length = 48
session.sid_bits_per_character = 6

; =============================================================================
; MISCELLANEOUS
; =============================================================================

; Restrict PHP file access to specific directories only
; PHP cannot read/write outside these paths (defence-in-depth if RFI bypasses other controls)
open_basedir = /var/www/html:/tmp

; Consistent UTF-8 encoding — prevents charset-based injection attacks
default_charset = "UTF-8"

; Disable output buffering by default — reduces information leakage risk
output_buffering = Off

; PHP timezone — set explicitly to avoid date/time inconsistencies
date.timezone = "UTC"
